name: Java CI/CD

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main", "feature/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK 26 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '26' # Auf deine lokale Version angepasst!
          distribution: 'temurin'

      - name: Kompiliere alles direkt ohne Pfadprobleme
        run: |
          mkdir -p target/classes
          find . -name "*.java" > sources.txt
          javac -d target/classes @sources.txt

      - name: Baue finale JAR-Datei
        run: |
          jar cvf target/TicTacToe-Game.jar -C target/classes .

      - name: JAR bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Game-JAR
          path: target/*.jar