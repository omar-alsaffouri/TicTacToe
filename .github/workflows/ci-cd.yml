name: Java CI/CD

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main", "feature/**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK 26 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'maven'

      # Tests, Checkstyle und Build laufen auf ALLEN Branches
      - name: Projekt mit Maven prüfen, testen und bauen
        run: mvn clean package
        working-directory: TicTacToe2

      # Nur auf MAIN die JAR vorbereiten
      - name: JAR für Artefakt vorbereiten
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p target/final
          cp target/*.jar target/final/TicTacToe-Game.jar
        working-directory: TicTacToe2

      # Nur auf MAIN die JAR hochladen
      - name: JAR bereitstellen
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Game-JAR
          path: TicTacToe2/target/final/TicTacToe-Game.jar