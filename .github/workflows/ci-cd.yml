name: Java CI/CD

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main", "feature/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK 26 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'maven'

      # Führt Maven direkt im Hauptverzeichnis aus
      - name: Projekt mit Maven bauen und testen
        run: mvn clean package

      # Bereitet die fertige JAR-Datei für den Download vor
      - name: JAR für Artefakt vorbereiten
        run: |
          mkdir -p target/final
          cp target/*.jar target/final/TicTacToe-Game.jar

      - name: JAR bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Game-JAR
          path: target/final/TicTacToe-Game.jar