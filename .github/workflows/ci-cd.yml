name: Java CI/CD

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main", "feature/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Code und Tests manuell kompilieren
        run: |
          mkdir -p target/classes
          mkdir -p target/test-classes
          
          # Alle Java-Dateien im Projekt finden und kompilieren
          find . -name "*.java" > sources.txt
          javac -d target/classes @sources.txt

      - name: JAR erzeugen
        run: |
          jar cvfe target/TicTacToe-Game.jar main.java.org.example.TicTacToe -C target/classes .

      - name: JAR bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Game-JAR
          path: target/*.jar