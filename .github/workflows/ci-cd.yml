name: Java CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, feature/boardtesting ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Führe nur Unit Tests aus (Checkstyle komplett skippen)
        run: mvn clean package -Dcheckstyle.skip=true

      - name: JAR bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Game-JAR
          path: target/*.jar