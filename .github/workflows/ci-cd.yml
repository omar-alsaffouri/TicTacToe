name: Java CI/CD

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main", "feature/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK 26 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'maven'

      # Springt in TicTacToe2, um das Projekt zu bauen
      - name: Projekt mit Maven bauen und testen
        run: mvn clean package
        working-directory: TicTacToe2

      # Bereitet die JAR-Datei im korrekten Unterordner vor
      - name: JAR für Artefakt vorbereiten
        run: |
          mkdir -p target/final
          cp target/*.jar target/final/TicTacToe-Game.jar
        working-directory: TicTacToe2

      - name: JAR bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Game-JAR
          path: TicTacToe2/target/final/TicTacToe-Game.jar