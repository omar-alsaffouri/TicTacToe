name: Java CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java JDK einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Code direkt kompilieren
        run: |
          mkdir -p target/classes
          find . -name "*.java" ! -path "*/test/*" > sources.txt
          javac -d target/classes @sources.txt
          jar cvfe target/TicTacToe-Game.jar main.java.org.example.TicTacToe -C target/classes .

      - name: JAR bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: TicTacToe-Game-JAR
          path: target/*.jar